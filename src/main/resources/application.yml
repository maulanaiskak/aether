spring:
  application:
    name: aether
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/aether
    username: aether
    password: aether
  flyway:
    url: jdbc:postgresql://localhost:5432/aether
    user: aether
    password: aether

aether:
  locations:
    - name: surabaya
      lat: -7.2575
      lon: 112.7521
    - name: jakarta
      lat: -6.2088
      lon: 106.8456
    - name: bandung
      lat: -6.9175
      lon: 107.6191
  mqtt:
    broker-url: tcp://localhost:1883
    client-id: aerator-01
    qos: 1
  ingestion:
    poll-cron: "0 0 * * * *"
    retry-max-attempts: 3
    retry-backoff-ms: 2000
  anomaly:
    window-size: 48
    zscore-threshold: 3.0
    iqr-multiplier: 1.5
  ml-service:
    base-url: http://ml-service:8000
    forecast-horizon-hours: 24
  insight:
    provider: rule-based
