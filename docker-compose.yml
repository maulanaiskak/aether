services:
  mosquitto:
    image: eclipse-mosquitto:2.0.20
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "aether", "-d", "aether"]
      interval: 5s
      timeout: 5s
      retries: 10

  aether:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/aether
      SPRING_R2DBC_USERNAME: aether
      SPRING_R2DBC_PASSWORD: ${POSTGRES_PASSWORD:-aether}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/aether
      SPRING_FLYWAY_USER: aether
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-aether}
      AETHER_MQTT_BROKER_URL: tcp://mosquitto:1883
      AETHER_ML_SERVICE_BASE_URL: http://ml-service:8000
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      aether:
        condition: service_healthy

volumes:
  postgres_data:
